<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Vim</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Input Vim</h1>

    <div class="toggle-row">
      <label for="enabled-toggle">Enabled</label>
      <input type="checkbox" id="enabled-toggle" checked>
    </div>

    <div class="toggle-row">
      <label for="start-mode">Start in</label>
      <select id="start-mode">
        <option value="INSERT">Insert mode</option>
        <option value="NORMAL">Normal mode</option>
      </select>
    </div>

    <div class="toggle-row">
      <label for="match-brackets">Match brackets</label>
      <input type="checkbox" id="match-brackets">
    </div>

    <div class="toggle-row">
      <label for="tab-size">Tab spaces</label>
      <select id="tab-size">
        <option value="2">2</option>
        <option value="4">4</option>
        <option value="8">8</option>
      </select>
    </div>

    <div class="toggle-row">
      <label for="indent-mode">Indent mode</label>
      <select id="indent-mode">
        <option value="off">Off</option>
        <option value="auto">Auto</option>
        <option value="smart">Smart</option>
      </select>
    </div>

    <div class="toggle-row">
      <label for="use-clipboard">System clipboard</label>
      <input type="checkbox" id="use-clipboard">
    </div>

    <div class="toggle-row">
      <label for="highlight-yank">Highlight yank</label>
      <input type="checkbox" id="highlight-yank">
    </div>

    <div class="toggle-row">
      <label for="half-page-jump">Ctrl+D/U lines</label>
      <input type="number" id="half-page-jump" min="1" max="100" value="20" style="width: 52px;">
    </div>

    <div class="toggle-row">
      <label for="always-centered">Always centered</label>
      <input type="checkbox" id="always-centered">
    </div>

    <div class="toggle-row">
      <label for="line-numbers">Line numbers (:e)</label>
      <select id="line-numbers">
        <option value="off">Off</option>
        <option value="absolute">Absolute</option>
        <option value="relative">Relative</option>
      </select>
    </div>

    <div class="section">
      <div class="section-header">
        <label>Excluded sites</label>
        <button id="bulk-edit-btn" class="btn-small">Edit as text</button>
      </div>

      <div id="exclude-current">
        <div class="exclude-url" id="current-url-text"></div>
        <button id="exclude-btn" class="btn-secondary">Exclude this site</button>
      </div>

      <!-- List view -->
      <div id="list-view">
        <ul id="exclude-list"></ul>
        <div id="no-excludes" class="hint">No sites excluded</div>
      </div>

      <!-- Bulk edit view -->
      <div id="bulk-view" class="hidden">
        <textarea id="exclude-textarea" placeholder="One pattern per line, e.g.&#10;*://github.com/*&#10;*://mail.google.com/*"></textarea>
        <div id="exclude-textarea-actions">
          <button id="bulk-cancel-btn" class="btn-secondary">Cancel</button>
          <button id="bulk-save-btn" class="btn-secondary btn-save">Save</button>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
